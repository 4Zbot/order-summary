<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>
    <link rel="stylesheet" href="/index.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <section class="card">
      <div class="img">
        <img src="./images/illustration-hero.svg" alt="" width="350" />
      </div>
      <div class="main-con">
        <h2 class="main-head">Order Summary</h2>
        <p class="para1">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
      </div>

      <div class="sec-con">
        <div class="img-con">
          <img src="/images/icon-music.svg" alt="" class="sec-img" width="40" />
          <div>
            <h4>Annual Plan</h4>
            <span>$59.99/year</span>
          </div>
        </div>
        <div id="btn">
          <a id="btna" href="#">Change</a>
        </div>
      </div>
      <button id="btn2">Proceed to Payment</button>

      <button id="btn3">Cancel order</button>
    </section>

    <!--  Order Summary

  !

  Annual Plan
  $59.99/year

  Change

  Proceed to Payment
  Cancel Order -->

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Fortune</a>.
    </footer>
  </body>
</html>
